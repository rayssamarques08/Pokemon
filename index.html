<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="conteudo">

        <!-- Cabeçalho da página -->
        <header>
            <h1 class="poppins-bold">Escolha seu Pokémon</h1>
        </header>

        <!-- Seção com os cards pokémon -->
        <section class="cards-lista">
            <article class="card planta">
                <figure class="avatar-container">
                    <div class="aro-avatar"></div>
                    <img src="img/bulbasaur.png" alt="Pokémon Bulbasaur em 3D">
                </figure>
                <h2 class="nome-pokemon poppins-bold">Bulbasaur</h2>
                <p class="tipo-pokemon">Planta</p>
                <dl class="lista-estatisticas">

                    <!-- Item de Estátistica -->
                    <!--  DT - termo de descrição 
                      DD - detalhes a descrição -->
                    <dt class="nome-estatistica">Força</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 60%;"></div>
                    </dd>
                   
                    <dt class="nome-estatistica">Velocidade</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 70%;"></div>
                    </dd>
                    
                    <dt class="nome-estatistica">Peso</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 45%;"></div>
                    </dd>
                 
                    <dt class="nome-estatistica">Habilidade</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 75%;"></div>
                    </dd>
                    <!-- fim -->
                </dl>
            </article>

            <article class="card agua">
                <figure class="avatar-container">
                    <div class="aro-avatar"></div>
                    <img src="img/squirtle.png" alt="Pokémon Squirtle em 3D">
                </figure>
                <h2 class="nome-pokemon poppins-bold">Squirtle</h2>
                <p class="tipo-pokemon">Água</p>
                <dl class="lista-estatisticas">

                    <!-- 2 -->
                  
                    <dt class="nome-estatistica">Força</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 60%;"></div>
                    </dd>
                   
                    <dt class="nome-estatistica">Velocidade</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 70%;"></div>
                    </dd>
                    
                    <dt class="nome-estatistica">Peso</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 45%;"></div>
                    </dd>
                 
                    <dt class="nome-estatistica">Habilidade</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 75%;"></div>
                    </dd>
                    <!-- fim -->
                </dl>
            </article>

            <article class="card fogo">
                <figure class="avatar-container">
                    <div class="aro-avatar"></div>
                    <img src="img/charmander.png" alt="Pokémon Charmander em 3D">
                </figure>
                <h2 class="nome-pokemon poppins-bold">Charmander</h2>
                <p class="tipo-pokemon">Fogo</p>
                <dl class="lista-estatisticas">

                    <!-- 3 -->
                    
                    <dt class="nome-estatistica">Força</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 60%;"></div>
                    </dd>
                   
                    <dt class="nome-estatistica">Velocidade</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 70%;"></div>
                    </dd>
                    
                    <dt class="nome-estatistica">Peso</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 45%;"></div>
                    </dd>
                 
                    <dt class="nome-estatistica">Habilidade</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 75%;"></div>
                    </dd>
                    <!-- fim -->
                </dl>
            </article>

            <article class="card eletrico">
                <figure class="avatar-container">
                    <div class="aro-avatar"></div>
                    <img src="img/pikachu.png" alt="Pokémon Pikachu em 3D">
                </figure>
                <h2 class="nome-pokemon poppins-bold">Pikachu</h2>
                <p class="tipo-pokemon">Elétrico</p>
                <dl class="lista-estatisticas">

                    <!--4-->
                   
                    <dt class="nome-estatistica">Força</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 60%;"></div>
                    </dd>
                   
                    <dt class="nome-estatistica">Velocidade</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 70%;"></div>
                    </dd>
                    
                    <dt class="nome-estatistica">Peso</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 45%;"></div>
                    </dd>
                 
                    <dt class="nome-estatistica">Habilidade</dt>
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 75%;"></div>
                    </dd>
                    <!-- fim -->
                </dl>
            </article>
        </section>



    </main>

</body>

</html>
